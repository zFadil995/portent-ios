name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - '**/*.swift'
      - '**/*.xcodeproj/**'
      - '**/*.xcworkspace/**'
      - '**/Package.swift'
      - '**/*.xctestplan'
      - '**/*.xcscheme'
      - '.github/workflows/**'
      - 'version.json'
  pull_request:
    branches: [main, develop]
    paths:
      - '**/*.swift'
      - '**/*.xcodeproj/**'
      - '**/*.xcworkspace/**'
      - '**/Package.swift'
      - '**/*.xctestplan'
      - '**/*.xcscheme'
      - '.github/workflows/**'
      - 'version.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    if: github.actor != 'dependabot[bot]'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PORTENT_REPO_TOKEN }}

      # Secret must be base64-encoded plist in GitHub repo settings (GOOGLE_SERVICE_INFO_PLIST)
      - name: Create GoogleService-Info.plist from secret
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -z "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "::error::GOOGLE_SERVICE_INFO_PLIST secret not set. Add base64-encoded plist as a repo secret for CI."
            exit 1
          fi
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 -d > Portent/GoogleService-Info.plist

      - uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Portent.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Run unit tests
        run: |
          # Canonical simulator — must match .cursor/commands/test-ios.md
          env CODE_SIGNING_ALLOWED=NO xcodebuild test \
            -scheme portent \
            -destination 'platform=iOS Simulator,name=iPhone Air,OS=latest' \
            -resultBundlePath TestResults \
            -enableCodeCoverage YES \
            | xcpretty

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ios-test-results
          path: TestResults.xcresult

      - name: Parse coverage
        if: always()
        run: |
          COVERAGE=$(xcrun xccov view --report --json TestResults.xcresult 2>/dev/null \
            | jq -r '([.targets[]? | select(.name == "Portent.app" or .name == "Portent")] | .[0].lineCoverage // 0) * 100 | floor' 2>/dev/null) || COVERAGE="N/A"
          echo "LINE_COVERAGE=${COVERAGE}" >> $GITHUB_ENV

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pct = process.env.LINE_COVERAGE ?? 'N/A';
            const body = `## 📊 iOS Test Coverage\n\nLine coverage: **${pct}%**\n\n> Generated by xccov`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  build:
    if: github.actor != 'dependabot[bot]'
    runs-on: macos-15
    needs: unit-test
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PORTENT_REPO_TOKEN }}

      # Secret must be base64-encoded plist in GitHub repo settings (GOOGLE_SERVICE_INFO_PLIST)
      - name: Create GoogleService-Info.plist from secret
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -z "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "::error::GOOGLE_SERVICE_INFO_PLIST secret not set. Add base64-encoded plist as a repo secret for CI."
            exit 1
          fi
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 -d > Portent/GoogleService-Info.plist

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Build
        run: |
          # Canonical simulator — must match .cursor/commands/test-ios.md
          env CODE_SIGNING_ALLOWED=NO xcodebuild build \
            -scheme portent \
            -destination 'platform=iOS Simulator,name=iPhone Air,OS=latest' \
            -configuration Debug \
            | xcpretty

  periphery:
    if: github.actor != 'dependabot[bot]'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PORTENT_REPO_TOKEN }}

      - name: Cache SPM
        uses: actions/cache@v5
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Run Periphery scan
        run: periphery scan > periphery-output.xml 2>&1 || true

      - name: Upload Periphery report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: periphery-report
          path: periphery-output.xml
          retention-days: 14

  version-check:
    if: github.actor != 'dependabot[bot]'
    runs-on: [self-hosted, truenas]
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PORTENT_REPO_TOKEN }}

      - name: Checkout mono repo for version.json
        uses: actions/checkout@v6
        with:
          repository: zFadil995/portent
          path: mono-repo
          ref: main
          token: ${{ secrets.PORTENT_REPO_TOKEN }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Parse version.json
        id: version
        run: |
          VERSION=$(jq -r '.version' mono-repo/version.json)
          IOS_BUILD=$(jq -r '.ios_build' mono-repo/version.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "ios_build=$IOS_BUILD" >> $GITHUB_OUTPUT

      - name: Parse project.pbxproj
        id: xcode
        run: |
          MARKETING_VERSION=$(grep -m1 "MARKETING_VERSION" Portent.xcodeproj/project.pbxproj | sed 's/.*= *\(.*\);/\1/' | tr -d ' ')
          CURRENT_PROJECT_VERSION=$(grep -m1 "CURRENT_PROJECT_VERSION" Portent.xcodeproj/project.pbxproj | sed 's/.*= *\(.*\);/\1/' | tr -d ' ')
          echo "marketing_version=$MARKETING_VERSION" >> $GITHUB_OUTPUT
          echo "current_project_version=$CURRENT_PROJECT_VERSION" >> $GITHUB_OUTPUT

      - name: Compare versions
        run: |
          JSON_VERSION="${{ steps.version.outputs.version }}"
          JSON_IOS_BUILD="${{ steps.version.outputs.ios_build }}"
          XCODE_VERSION="${{ steps.xcode.outputs.marketing_version }}"
          XCODE_BUILD="${{ steps.xcode.outputs.current_project_version }}"
          if [ "$XCODE_VERSION" != "$JSON_VERSION" ] || [ "$XCODE_BUILD" != "$JSON_IOS_BUILD" ]; then
            echo "::error::Version mismatch: project.pbxproj has MARKETING_VERSION=$XCODE_VERSION CURRENT_PROJECT_VERSION=$XCODE_BUILD but version.json has version=$JSON_VERSION ios_build=$JSON_IOS_BUILD"
            exit 1
          fi
          echo "Version check passed: $XCODE_VERSION / $XCODE_BUILD"
