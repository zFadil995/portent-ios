name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    runs-on: [self-hosted, truenas]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PORTENT_REPO_TOKEN }}

      - name: Install SwiftLint
        run: |
          curl -sSfL https://github.com/realm/SwiftLint/releases/download/0.54.0/swiftlint_linux.zip -o /tmp/swiftlint.zip
          sudo unzip -o /tmp/swiftlint.zip -d /opt/swiftlint
          sudo cp "$(find /opt/swiftlint -name swiftlint -type f | head -1)" /usr/local/bin/swiftlint
          sudo chmod +x /usr/local/bin/swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging
        continue-on-error: false

  unit-test:
    runs-on: macos-15
    needs: swiftlint
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PORTENT_REPO_TOKEN }}

      # Secret must be base64-encoded plist in GitHub repo settings (GOOGLE_SERVICE_INFO_PLIST)
      - name: Create GoogleService-Info.plist from secret
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -z "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "::error::GOOGLE_SERVICE_INFO_PLIST secret not set. Add base64-encoded plist as a repo secret for CI."
            exit 1
          fi
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 -d > Portent/GoogleService-Info.plist

      - uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Portent.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Run unit tests
        run: |
          # Canonical simulator — must match .cursor/commands/test-ios.md
          env CODE_SIGNING_ALLOWED=NO xcodebuild test \
            -scheme portent \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults \
            | xcpretty

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-test-results
          path: TestResults.xcresult

  build:
    runs-on: macos-15
    needs: unit-test
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PORTENT_REPO_TOKEN }}

      # Secret must be base64-encoded plist in GitHub repo settings (GOOGLE_SERVICE_INFO_PLIST)
      - name: Create GoogleService-Info.plist from secret
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -z "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "::error::GOOGLE_SERVICE_INFO_PLIST secret not set. Add base64-encoded plist as a repo secret for CI."
            exit 1
          fi
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 -d > Portent/GoogleService-Info.plist

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Build
        run: |
          # Canonical simulator — must match .cursor/commands/test-ios.md
          env CODE_SIGNING_ALLOWED=NO xcodebuild build \
            -scheme portent \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            | xcpretty

  version-check:
    runs-on: [self-hosted, truenas]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PORTENT_REPO_TOKEN }}

      - name: Checkout mono repo for version.json
        uses: actions/checkout@v4
        with:
          repository: zFadil995/portent
          path: mono-repo
          ref: main
          token: ${{ secrets.PORTENT_REPO_TOKEN }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Parse version.json
        id: version
        run: |
          VERSION=$(jq -r '.version' mono-repo/version.json)
          IOS_BUILD=$(jq -r '.ios_build' mono-repo/version.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "ios_build=$IOS_BUILD" >> $GITHUB_OUTPUT

      - name: Parse project.pbxproj
        id: xcode
        run: |
          MARKETING_VERSION=$(grep -m1 "MARKETING_VERSION" Portent.xcodeproj/project.pbxproj | sed 's/.*= *\(.*\);/\1/' | tr -d ' ')
          CURRENT_PROJECT_VERSION=$(grep -m1 "CURRENT_PROJECT_VERSION" Portent.xcodeproj/project.pbxproj | sed 's/.*= *\(.*\);/\1/' | tr -d ' ')
          echo "marketing_version=$MARKETING_VERSION" >> $GITHUB_OUTPUT
          echo "current_project_version=$CURRENT_PROJECT_VERSION" >> $GITHUB_OUTPUT

      - name: Compare versions
        run: |
          JSON_VERSION="${{ steps.version.outputs.version }}"
          JSON_IOS_BUILD="${{ steps.version.outputs.ios_build }}"
          XCODE_VERSION="${{ steps.xcode.outputs.marketing_version }}"
          XCODE_BUILD="${{ steps.xcode.outputs.current_project_version }}"
          if [ "$XCODE_VERSION" != "$JSON_VERSION" ] || [ "$XCODE_BUILD" != "$JSON_IOS_BUILD" ]; then
            echo "::error::Version mismatch: project.pbxproj has MARKETING_VERSION=$XCODE_VERSION CURRENT_PROJECT_VERSION=$XCODE_BUILD but version.json has version=$JSON_VERSION ios_build=$JSON_IOS_BUILD"
            exit 1
          fi
          echo "Version check passed: $XCODE_VERSION / $XCODE_BUILD"
